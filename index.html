<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asian Travel Blog</title>
    <link rel="stylesheet" href="/index/index.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="container py-5">
      <section class="row justify-content-center">
        <article class="col-12 col-lg-9">
          <div class="p-4 p-md-5 border rounded-3 bg-body-tertiary">
            <h1 class="mb-3">Welcome to Asian Travel Blog</h1>
            <p class="lead mb-3">
              This app helps you explore travel stories, destination ideas, and cultural highlights from around Asia.
            </p>
            <p class="mb-4">
              Browse posts from different countries, save your favorites, and discover your next trip inspiration.
            </p>
            <p class="h5 mb-4">Please, login/register</p>
            <div class="d-flex flex-wrap gap-2">
              <a class="btn btn-primary" href="/login">Login</a>
              <a class="btn btn-outline-secondary" href="/register">Register</a>
            </div>
          </div>
        </article>
      </section>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/index/index.js"></script>
  </body>
</html>
