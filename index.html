<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asian Travel Blog</title>
    <link rel="stylesheet" href="/index/index.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="pb-5">
      <section class="hero-section text-white d-flex align-items-center mb-5">
        <div class="container py-5">
          <div class="col-12 col-lg-8">
            <h1 class="hero-heading display-5 fw-bold mb-3">Discover the Wonders of Asia</h1>
            <p class="hero-subtitle lead mb-4">
              Explore authentic travel stories, hidden gems, and cultural highlights from destinations across Asia.
            </p>
            <div class="hero-actions d-flex gap-2 flex-wrap">
              <a id="hero-see-posts-button" class="hero-action-btn btn btn-warning btn-lg" href="#country-posts-title">See the posts</a>
              <button
                type="button"
                class="hero-action-btn btn btn-outline-light btn-lg"
                data-bs-toggle="modal"
                data-bs-target="#createPostModal"
              >
                Create a post
              </button>
            </div>
          </div>
        </div>
      </section>

      <div class="modal fade" id="createPostModal" tabindex="-1" aria-labelledby="createPostModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="createPostModalLabel">Create Post</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="home-create-post-form">
              <div class="modal-body">
                <div class="mb-3">
                  <label for="home-post-title" class="form-label">Title</label>
                  <input id="home-post-title" type="text" class="form-control" required />
                </div>

                <div class="mb-3">
                  <label for="home-post-content" class="form-label">Content</label>
                  <textarea id="home-post-content" class="form-control" rows="5" required></textarea>
                </div>

                <div class="mb-3">
                  <label for="home-post-country" class="form-label">Country</label>
                  <select id="home-post-country" class="form-select" required>
                    <option value="">Select a country</option>
                  </select>
                </div>

                <div class="mb-1">
                  <label for="home-post-photo" class="form-label">Photo Attachment</label>
                  <input id="home-post-photo" type="file" class="form-control" accept="image/*" />
                </div>

                <p id="home-create-post-message" class="small mt-3 mb-0"></p>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="home-create-post-submit" type="submit" class="btn btn-primary">Create Post</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <section class="container mb-5" aria-labelledby="featured-posts-title">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 id="featured-posts-title" class="h3 mb-0">Featured Posts</h2>
        </div>

        <div id="featured-loading" class="alert alert-secondary mb-3" role="status">Loading featured posts...</div>
        <div id="featured-empty" class="alert alert-light border d-none mb-3">No featured posts available yet.</div>

        <div id="featured-carousel-wrapper" class="d-none">
          <div id="featured-carousel" class="carousel slide rounded-4 overflow-hidden" data-bs-ride="carousel">
            <div id="featured-carousel-indicators" class="carousel-indicators"></div>
            <div id="featured-carousel-inner" class="carousel-inner"></div>
            <button class="carousel-control-prev" type="button" data-bs-target="#featured-carousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#featured-carousel" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        </div>
      </section>

      <section class="container" aria-labelledby="country-posts-title">
        <h2 id="country-posts-title" class="h3 mb-3">Posts by Country</h2>

        <div class="input-group mb-4">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input
            type="text"
            id="countrySearch"
            class="form-control form-control-lg"
            placeholder="Search posts by country name (e.g., Japan, Thailand)..."
          />
        </div>

        <div id="posts-loading" class="alert alert-secondary mb-3" role="status">Loading posts...</div>

        <div id="postsContainer" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
      </section>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/index/index.js"></script>
  </body>
</html>
