<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Posts | Asian Travel Blog</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="container py-4 py-md-5">
      <section class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">My Posts</h2>
        <a href="/create-post.html" class="btn btn-primary">
          <i class="bi bi-plus-lg me-2"></i>
          Create Post
        </a>
      </section>

      <div id="my-posts-message" class="alert d-none" role="alert"></div>

      <div id="my-posts-table-wrap" class="table-responsive d-none">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th scope="col">Title</th>
              <th scope="col">Status</th>
              <th scope="col" class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="my-posts-tbody"></tbody>
        </table>
      </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/my-posts.js"></script>
  </body>
</html>
