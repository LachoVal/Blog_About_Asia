<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Asian Travel Blog</title>
    <link rel="stylesheet" href="/register/register.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="auth-page py-4 py-md-5">
      <div class="container auth-window d-flex align-items-center justify-content-center">
        <section class="auth-card p-4 p-md-5 shadow-sm">
          <h1 class="auth-title mb-2 text-center">Create Account</h1>
          <p class="auth-subtitle text-body-secondary text-center mb-4">Join and save your favorite Asia travel inspiration.</p>

          <form id="register-form" class="row g-3">
            <div class="col-12">
              <label for="register-name" class="form-label">Name</label>
              <input id="register-name" name="name" type="text" class="form-control form-control-lg" autocomplete="name" required />
            </div>
            <div class="col-12">
              <label for="register-email" class="form-label">Email</label>
              <input id="register-email" name="email" type="email" class="form-control form-control-lg" autocomplete="email" required />
            </div>
            <div class="col-12">
              <label for="register-password" class="form-label">Password</label>
              <input id="register-password" name="password" type="password" class="form-control form-control-lg" minlength="6" autocomplete="new-password" required />
            </div>
            <div class="col-12 d-grid gap-2 mt-2">
              <button class="btn btn-primary btn-lg" type="submit">Create Account</button>
              <a class="btn btn-outline-secondary" href="/login/index.html">Back to login</a>
            </div>
          </form>

          <p id="register-message" class="mt-3 mb-0 text-center"></p>
        </section>
      </div>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/register/register.js"></script>
  </body>
</html>
