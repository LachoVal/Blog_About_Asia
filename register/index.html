<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Asian Travel Blog</title>
    <link rel="stylesheet" href="/register/register.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="container py-5">
      <h1 class="mb-4">Register</h1>
      <form id="register-form" class="row g-3 col-12 col-md-8 col-lg-6">
        <div class="col-12">
          <label for="register-email" class="form-label">Email</label>
          <input id="register-email" name="email" type="email" class="form-control" required />
        </div>
        <div class="col-12">
          <label for="register-password" class="form-label">Password</label>
          <input id="register-password" name="password" type="password" class="form-control" minlength="6" required />
        </div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary" type="submit">Create Account</button>
          <a class="btn btn-outline-secondary" href="/login">Back to login</a>
        </div>
      </form>
      <p id="register-message" class="mt-3 mb-0"></p>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/register/register.js"></script>
  </body>
</html>
