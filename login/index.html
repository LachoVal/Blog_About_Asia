<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Asian Travel Blog</title>
    <link rel="stylesheet" href="/login/login.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="container py-5">
      <h1 class="mb-4">Login</h1>
      <form id="login-form" class="row g-3 col-12 col-md-8 col-lg-6">
        <div class="col-12">
          <label for="email" class="form-label">Email</label>
          <input id="email" name="email" type="email" class="form-control" required />
        </div>
        <div class="col-12">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" type="password" class="form-control" required />
        </div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary" type="submit">Sign In</button>
          <a class="btn btn-outline-secondary" href="/register">Create account</a>
        </div>
      </form>
      <p id="login-message" class="mt-3 mb-0"></p>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/login/login.js"></script>
  </body>
</html>
