<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Details | Asian Travel Blog</title>
    <link rel="stylesheet" href="/posts/posts.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="container py-5">
      <article class="card shadow-sm">
        <div class="card-body">
          <p id="post-id" class="text-body-secondary mb-2"></p>
          <h1 id="post-title" class="h3"></h1>
          <p id="post-content" class="mb-4"></p>
          <div class="d-flex gap-2 flex-wrap">
            <button id="save-favorite" class="btn btn-primary">Add to Favorites</button>
            <a class="btn btn-outline-secondary" href="/favorites">Go to Favorites</a>
          </div>
          <p id="post-message" class="mt-3 mb-0"></p>
        </div>
      </article>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/posts/posts.js"></script>
  </body>
</html>
