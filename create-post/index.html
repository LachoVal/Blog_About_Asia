<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post | Asian Travel Blog</title>
    <link rel="stylesheet" href="/create-post/create-post.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="container py-5">
      <h1 class="mb-4">Create New Post</h1>
      <form id="create-post-form" class="row g-3 col-12 col-lg-8">
        <div class="col-12">
          <label for="post-title" class="form-label">Title</label>
          <input id="post-title" name="title" type="text" class="form-control" required />
        </div>
        <div class="col-12">
          <label for="post-content" class="form-label">Content</label>
          <textarea id="post-content" name="content" class="form-control" rows="6" required></textarea>
        </div>
        <div id="post-country-group" class="col-12 d-none">
          <label for="post-country-id" class="form-label">Country</label>
          <select id="post-country-id" name="country_id" class="form-select">
            <option value="">Select a country</option>
          </select>
        </div>
        <div class="col-12">
          <button class="btn btn-primary" type="submit">Publish</button>
        </div>
      </form>
      <p id="create-post-message" class="mt-3 mb-0"></p>
    </main>

    <div id="app-footer"></div>

    <script type="module" src="/create-post/create-post.js"></script>
  </body>
</html>
